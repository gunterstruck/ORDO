<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E8A87C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ORDO">
  <title>ORDO – Dein Haushaltsassistent</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Minimal-Header -->
  <header id="ordo-header" class="ordo-header">
    <span class="ordo-logo">ORDO</span>
    <div class="ordo-header-actions">
      <button id="ordo-home-btn" class="header-icon-btn" aria-label="Home">🏠</button>
      <button id="ordo-settings-btn" class="header-icon-btn" aria-label="Einstellungen">⚙️</button>
    </div>
  </header>

  <!-- Der Dialog-Stream — DAS ist die ganze App -->
  <main id="dialog-stream" class="dialog-stream">
    <!-- Hier erscheinen alle Agent- und User-Nachrichten -->
  </main>

  <!-- Input-Bar (fixiert am unteren Rand) -->
  <footer id="input-bar" class="input-bar">
    <button id="voice-btn" class="voice-main-btn" aria-label="Sprechen">
      <span class="voice-icon">🎤</span>
    </button>
    <button id="photo-btn" class="input-icon-btn" aria-label="Foto">📷</button>
    <button id="video-btn" class="input-icon-btn" aria-label="Video">🎥</button>
    <div id="text-input-wrapper" class="text-input-wrapper collapsed">
      <input type="text" id="text-input" placeholder="Oder tippe..."
             enterkeyhint="send" autocomplete="off">
      <button id="send-btn" class="send-btn" aria-label="Senden">➤</button>
    </div>
  </footer>

  <!-- Fullscreen-Overlays für Kamera, Picking, etc. -->
  <div id="fullscreen-overlay" class="fullscreen-overlay hidden"></div>

  <!-- ── TOAST CONTAINER ──────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── MODAL (wiederverwendbar) ─────────────────────── -->
  <div id="ordo-modal" class="ordo-modal-backdrop" style="display:none" aria-modal="true" role="dialog">
    <div class="ordo-modal-panel">
      <h3 id="ordo-modal-title" class="ordo-modal-title"></h3>
      <p id="ordo-modal-desc" class="ordo-modal-desc"></p>
      <div id="ordo-modal-fields" class="ordo-modal-fields"></div>
      <div id="ordo-modal-actions" class="ordo-modal-actions"></div>
    </div>
  </div>

  <!-- ── LIGHTBOX ──────────────────────────────────────── -->
  <div id="lightbox" class="lightbox" style="display:none">
    <button id="lightbox-close" class="lightbox-close" aria-label="Schließen">✕</button>
    <img id="lightbox-img" alt="Vollbild">
  </div>

  <!-- ── PICKING OVERLAY ───────────────────────────────── -->
  <div id="picking-overlay" class="picking-overlay" style="display:none" aria-modal="true" role="dialog" aria-label="Gegenstände markieren">
    <div class="picking-header">
      <button id="picking-close" class="picking-close-btn" aria-label="Schließen">✕</button>
      <span class="picking-header-title">Gegenstände markieren</span>
      <button id="picking-done" class="picking-done-btn">Fertig</button>
    </div>
    <div id="picking-photo-wrapper" class="picking-photo-wrapper">
      <img id="picking-photo" alt="Foto analysieren">
    </div>
    <div id="picking-summary" class="picking-summary"></div>
    <div id="picking-panel" class="picking-panel" style="display:none">
      <div id="picking-panel-label" class="picking-panel-label"></div>
      <input type="hidden" id="picking-panel-input" class="picking-panel-input">
      <div class="picking-panel-actions">
        <button id="picking-panel-mic" class="picking-panel-mic picking-panel-mic--primary" aria-label="Diktieren">🎤 Diktieren</button>
        <button id="picking-panel-confirm" class="picking-panel-confirm">Stimmt ✓</button>
        <button id="picking-panel-skip" class="picking-panel-skip">Überspringen</button>
      </div>
    </div>
  </div>

  <!-- ── STAGING OVERLAY ───────────────────────────────── -->
  <div id="staging-overlay" class="staging-overlay" style="display:none" aria-modal="true" role="dialog" aria-label="Fotos sammeln">
    <div class="staging-modal">
      <div class="staging-header">
        <button id="staging-close" class="staging-close-btn" aria-label="Schließen">✕</button>
        <span id="staging-title" class="staging-title">Fotos sammeln</span>
      </div>
      <div id="staging-thumbnails" class="staging-thumbnails"></div>
      <div class="staging-add-row">
        <button id="staging-add-btn" class="staging-add-btn">+ Foto hinzufügen</button>
      </div>
      <p id="staging-hint" class="staging-hint" style="display:none"></p>
      <div class="staging-footer">
        <button id="staging-cancel-btn" class="staging-cancel-btn">Abbrechen</button>
        <button id="staging-analyze-btn" class="staging-analyze-btn" disabled>Analysieren</button>
      </div>
    </div>
  </div>

  <!-- ── REVIEW OVERLAY ────────────────────────────────── -->
  <div id="review-overlay" class="review-overlay" style="display:none" aria-modal="true" role="dialog" aria-label="Erkannte Gegenstände prüfen">
    <div class="review-modal">
      <div class="review-header">
        <h2 class="review-title">Erkannte Gegenstände</h2>
        <p id="review-subtitle" class="review-subtitle"></p>
      </div>
      <p class="review-hint">Hake an was stimmt. Korrigiere Namen oder Mengen per Tippen. Nicht Erkanntes unten manuell hinzufügen.</p>
      <p id="review-tip" class="review-tip" style="display:none"></p>
      <div id="review-list" class="review-list"></div>
      <button id="review-add-manual" class="review-add-manual-btn">+ Gegenstand manuell hinzufügen</button>
      <div class="review-actions">
        <button id="review-cancel" class="review-cancel-btn">Abbrechen</button>
        <button id="review-confirm" class="review-confirm-btn">Übernehmen</button>
      </div>
    </div>
  </div>

  <!-- ── CAMERA CAPTURE OVERLAY ─────────────────────────── -->
  <div id="camera-overlay" class="camera-overlay" style="display:none">
    <video id="camera-video" class="camera-video" autoplay playsinline muted></video>
    <div id="camera-record-timer" class="camera-record-timer" style="display:none">0:00</div>
    <div class="camera-controls">
      <button id="camera-cancel-btn" class="camera-cancel-btn" aria-label="Abbrechen">✕</button>
      <button id="camera-shutter-btn" class="camera-shutter-btn" aria-label="Foto aufnehmen"></button>
      <button id="camera-switch-btn" class="camera-switch-btn" aria-label="Kamera wechseln">🔄</button>
    </div>
  </div>

  <!-- ── PHOTO TIMELINE OVERLAY ────────────────────────── -->
  <div id="photo-timeline-overlay" class="photo-timeline-overlay" style="display:none">
    <div class="photo-timeline-header">
      <button id="photo-timeline-close" class="picking-close-btn" aria-label="Schließen">✕</button>
      <span class="photo-timeline-title">Foto-Historie</span>
    </div>
    <div id="photo-timeline-grid" class="photo-timeline-grid"></div>
  </div>

  <!-- ── MOVE CONTAINER OVERLAY ────────────────────────── -->
  <div id="move-container-overlay" class="move-container-overlay" style="display:none">
    <div class="move-container-modal">
      <div class="staging-header">
        <button id="move-container-close" class="staging-close-btn" aria-label="Schließen">✕</button>
        <span class="staging-title">Verschieben nach…</span>
      </div>
      <div id="move-container-list" class="move-container-list"></div>
      <div class="staging-footer">
        <button id="move-container-cancel" class="staging-cancel-btn">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Hidden file inputs (used by various modules) -->
  <input type="file" id="photo-input-gallery" accept="image/*" style="display:none" aria-label="Bild aus Galerie">
  <input type="file" id="photo-input-video" accept="video/*" style="display:none" aria-label="Video hochladen">
  <input type="file" id="settings-import-file" accept=".json" style="display:none" aria-label="Import-Datei">

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
    "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
